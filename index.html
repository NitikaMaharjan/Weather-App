<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <meta name="description" content="SkyView Weather App using JavaScript">
        <meta name="author" content="Nitika Maharjan">
        <title>SkyView Weather App</title>
        <link rel="stylesheet" href="style.css">
    </head>
    <body>
        <div class="navbar">
            <h2>SkyView Weather</h2>
            <form id="weatherForm">                
                <div class="input-bar" id="input-bar">
                    <img src="./images/search.png" alt="search icon" style="width: 18px; height: auto; opacity: 80%;"/>
                    <input type="text" id="location" placeholder="Enter location..." onfocus="document.getElementById('input-bar').style.border='2px solid #13759a'" onblur="document.getElementById('input-bar').style.border='2px solid #5096ad'"/>
                    <img src="./images/close.png" alt="close icon" class="close-btn" id="close-btn" style="width: 14px; height: auto; opacity: 0%;" onclick="handleClear()"/>
                </div>
                <input type="submit" value="Search"/>
            </form>
            <div style="display: flex; align-items: center; gap: 18px;">
                <h4 id="current-time"></h4>
                <button id="theme-toggle"><img id="theme-icon" src="./images/moon.png" alt="theme icon" style="width: 24px; height: auto;"/></button>
            </div>
        </div>

        <div class="container">

            <div class="container-one">
                <div style="display: flex; align-items: center; justify-content: space-between; margin-bottom: 30px;">
                    <div class="location-tag">
                        <img src="./images/location.png" alt="location icon" style="width: 20px; height: auto;"/>
                        <p id="timezone" style="font-size: 14px;"></p>
                    </div>
                    <h4 id="current-day"></h4>
                </div>

                <div style="text-align: center; margin-bottom: 30px;">
                    <img id="weather-icon" src="./images/cloudy.png" alt="weather icon" style="width: 40px; height: auto;"/>
                    <p id="conditions" style="font-size: 20px;"></p>
                </div>

                <div style="display: flex; gap: 12px;">
                    <div class="weather-cube">
                        <p style="font-size: 14px;">Temperature</p>
                        <div style="display: flex;">
                            <p id="temp" style="font-size: 20px;"></p><p style="font-size: 20px;">&nbsp;°F</p>
                        </div>
                    </div>
                    <div class="weather-cube">
                        <p style="font-size: 14px;">Wind speed</p>
                        <div style="display: flex;">
                            <p id="windspeed" style="font-size: 20px;"></p><p style="font-size: 20px;">&nbsp;km</p>
                        </div>
                    </div>
                    <div class="weather-cube">
                        <p style="font-size: 14px;">Humidity</p>
                        <div style="display: flex;">
                            <p id="humidity" style="font-size: 20px;"></p><p style="font-size: 20px;">&nbsp;%</p>
                        </div>
                    </div>
                    <div class="weather-cube">
                        <p style="font-size: 14px;">Chances of Rain</p>
                        <div style="display: flex;">
                            <p id="precipprob" style="font-size: 20px;"></p><p style="font-size: 20px;">&nbsp;%</p>
                        </div>                        
                    </div>
                </div>
            </div>
            
            <div class="container-two">                              
            </div>
        </div>

        <div class="hourly-forecast">
            <h4>Hourly Forecast</h4>
            <div id="twentyfour-hour">
            </div>
        </div>

        <div id="alert-background">
            <div id="alert">
                <div class="alert-box">
                    <div style="display: flex; align-items: center; gap: 12px;">                        
                        <img src="./images/alert.png" alt="alert icon" style="width: 20px; height: auto;"/>
                        <div id="alert-msg">
                        </div>
                    </div>
                    <img src="./images/close.png" alt="close icon" style="width: 14px; height: auto; cursor: pointer;" onclick="handleCloseAlert()"/>
                </div>
            </div>
        </div>

        <script src="index.js"></script>
    </body>
</html>
