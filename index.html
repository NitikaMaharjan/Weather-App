<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <meta name="description" content="Weather App using JavaScript">
        <meta name="author" content="Nitika Maharjan">
        <title>Weather App</title>
        <link rel="stylesheet" href="style.css">
    </head>
    <body>
        <form id="weatherForm">
            <label for="location">Enter location</label>
            <input type="text" id="location"/>
            
            <input type="submit" value="Get Weather"/>
        </form>
 
        <div id="today-weather">
            <div class="weather-data-row">
                <p>Latitude</p>
                <p id="latitude"></p>
            </div>
            <div class="weather-data-row">
                <p>Longitude</p>
                <p id="longitude"></p>
            </div>
            <div class="weather-data-row">
                <p>Resolved Address</p>
                <p id="resolvedAddress"></p>
            </div>
            <div class="weather-data-row">
                <p>Timezone</p>
                <p id="timezone"></p>
            </div>
            <div>
                <p>Current Conditions</p>
                <div class="weather-data-row">
                    <p>Conditions</p>
                    <p id="conditions"></p>
                </div>
                <div class="weather-data-row">
                    <p>Date Time</p>
                    <p id="datetime"></p>
                </div>
                <div class="weather-data-row">
                    <p>Humidity</p>
                    <p id="humidity"></p>
                </div>
                <div class="weather-data-row">
                    <p>Temp</p>
                    <p id="temp"></p>
                </div>
                <div class="weather-data-row">
                    <p>Visibility</p>
                    <p id="visibility"></p>
                </div>
                <div class="weather-data-row">
                    <p>Wind Speed</p>
                    <p id="windspeed"></p>
                </div>
                <div class="weather-data-row">
                    <p>Chances of Rain</p>
                    <p id="precipprob"></p>
                </div>
            </div>
        </div>

        <div id="twentyfour-hour">
            <div class="weather-data-row">
                <p>Conditions</p>
                <p id="conditions2"></p>
            </div>
            <div class="weather-data-row">
                <p>Date Time</p>
                <p id="datetime2"></p>
            </div>
            <div class="weather-data-row">
                <p>Humidity</p>
                <p id="humidity2"></p>
            </div>
            <div class="weather-data-row">
                <p>Temp</p>
                <p id="temp2"></p>
            </div>
            <div class="weather-data-row">
                <p>Visibility</p>
                <p id="visibility2"></p>
            </div>
            <div class="weather-data-row">
                <p>Wind Speed</p>
                <p id="windspeed2"></p>
            </div>
            <div class="weather-data-row">
                <p>Chances of Rain</p>
                <p id="precipprob2"></p>
            </div>
        </div>
        <script src="index.js"></script>
    </body>
</html>
